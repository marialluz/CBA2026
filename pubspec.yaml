name: cba2026
description: "Projeto e Avaliação de um Assistente Vocal Automotivo Baseado em RAG para Suporte Técnico Veicular"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  elevenlabs_agents: ^0.4.0
  flutter_riverpod: ^2.6.1
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  permission_handler: ^11.3.1
  logging: ^1.3.0
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  path: ^1.9.1
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.5
  build_runner: ^2.4.14
  drift_dev: ^2.22.1

